<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <body> 
        <h2>User Registration</h2> 
        <form id="regForm"> 
     
            <label>Full Name:</label> 
            <input type="text" class="inputs"> 
            <span class="error"></span><br> 
     
            <label>Email:</label> 
            <input type="email" class="inputs"> 
            <span class="error"></span><br> 
     
            <label>Password:</label> 
            <input type="password" class="inputs"> 
            <span class="error"></span><br> 
     
            <label>Confirm Password:</label> 
            <input type="password" class="inputs"> 
            <span class="error"></span><br> 
     
            <label>Gender:</label> 
            <input type="radio" name="gender" value="Male" class="inputs"> Male 
            <input type="radio" name="gender" value="Female" class="inputs"> Female 
            <span class="error"></span><br> 
     
            <label>DOB:</label> 
            <input type="date" class="inputs"> 
            <span class="error"></span><br> 
     
            <button type="submit">Register</button> 
        </form> 
      
    
</body>
</html>
