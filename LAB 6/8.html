<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile Form</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 30px auto;
        }
        td, th {
            border: 1px solid #000000;
            padding: 10px 12px;
            vertical-align: top;
        }
        th {
            background-color: #ffffff;
            font-size: 1.5em;
        }
        .buttons {
            text-align: right;
        }
        .error {
            color: rgb(212, 17, 17);
            display: block;
        }
        
        .dob-group input {
            width: 45px;
            margin-right: 2px;
        }
        .info-icon {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid #1e1bcc;
            text-align: center;
            line-height: 20px;
            font-weight: bold;
            color: blue;
            cursor: default;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <form enctype="multipart/form-data" id="profileForm">
        <table>
            <tr><th colspan="2">PERSON PROFILE</th></tr>

            <!-- Name -->
            <tr>
                <td>Name</td>
                <td>
                    <input type="text" id="fullName">
                    <span class="error" id="nameError"></span>
                </td>
            </tr>

            <!-- Email -->
            <tr>
                <td>Email</td>
                <td>
                    <input type="text" id="email" >
                    <span class="info-icon" title="Hint: name@domain.com">i</span>
                    <span class="error" id="emailError"></span>
                </td>
            </tr>

            <!-- Gender -->
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" id="genderMale" value="Male"> Male
                    <input type="radio" name="gender" id="genderFemale" value="Female"> Female
                    <input type="radio" name="gender" id="genderOther" value="Other"> Other
                    <span class="error" id="genderError"></span>
                </td>
            </tr>

            <!-- Date of Birth -->
            <tr>
                <td>Date of Birth</td>
                <td class="dob-group">
                    <input type="text" id="dob_day" size="2" maxlength="2" > /
                    <input type="text" id="dob_month" size="2" maxlength="2" > /
                    <input type="text" id="dob_year" size="4" maxlength="4"> (dd/mm/yyyy)
                    <span class="error" id="dobError"></span>
                </td>
            </tr>

            <!-- Blood Group -->
            <tr>
                <td>Blood Group</td>
                <td>
                    <select id="bloodGroup">
                        <option value="" disabled selected>Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                    <span class="error" id="bloodError"></span>
                </td>
            </tr>

            <!-- Degree -->
            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox" name="degree" id="degSSC" value="SSC"> SSC
                    <input type="checkbox" name="degree" id="degHSC" value="HSC"> HSC
                    <input type="checkbox" name="degree" id="degBSc" value="BSc"> BSc
                    <input type="checkbox" name="degree" id="degMSc" value="MSc"> MSc
                    <span class="error" id="degreeError"></span>
                </td>
            </tr>

            <!-- User ID -->
            <tr>
                <td>User ID</td>
                <td>
                    <input type="text" id="userId">
                    <span class="error" id="userIdError"></span>
                </td>
            </tr>

            <!-- Photo -->
            <tr>
                <td>Photo</td>
                <td>
                    <input type="file" id="profilePic" accept="image/*">
                    <span class="error" id="photoError"></span>
                </td>
            </tr>

            <!-- Spacer -->
            <tr><td colspan="2">&nbsp;</td></tr>

            <!-- Buttons -->
            <tr>
                <td colspan="2" class="buttons">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

    <!-- Link to external JavaScript file -->
    <script src="validation.js"></script>
</body>
</html>
