<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8</title>
    <style>
        table {
            border-collapse: collapse;
            width: 30%;
            margin: 30px auto;
        }
        td, th {
            border: 1px solid black;
            padding: 8px 12px;
        }
        th {
            text-align: center;
            font-size: 20px;
        }
        .buttons {
            text-align: right;
        }
    </style>
</head>
<body>
    <form enctype="multipart/form-data">  
    <table>
        
        <tr>
            <th colspan="2">PERSON PROFILE</th>
        </tr>
    
        <tr>
            <td>Name</td>
            <td><input type="text"></td>
        </tr>
    
        <tr>
            <td>Email</td>
            <td><input type="email"></td>
        </tr>
    
       
        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female
                <input type="radio" name="g"> Other
            </td>
        </tr>
    
      
        <tr>
            <td>Date of Birth</td>
            <td>
                <input type="text" size="2"> /
                <input type="text" size="2"> /
                <input type="text" size="4"> (dd/mm/yyyy)
            </td>
        </tr>
    
     
        <tr>
            <td>Blood Group</td>
            <td>
                <select>
                    <option>A+</option>
                    <option>B+</option>
                    <option>O+</option>
                    <option>AB+</option>
                </select>
            </td>
        </tr>
    
   
        <tr>
            <td>Degree</td>
            <td>
                <input type="checkbox"> SSC
                <input type="checkbox"> HSC
                <input type="checkbox"> BSc
                <input type="checkbox"> MSc
            </td>
        </tr>
    
     
        <tr>
            <td>Photo</td>
            <td><input type="file"></td>
        </tr>
    
        
        <tr>
            <td colspan="2">&nbsp;</td>
        </tr>
    
        
        <tr>
            <td colspan="2" class="buttons">
                <input type="submit">
                <input type="reset">
            </td>
        </tr>
    
    </table>
</form>
</body>
</html>
